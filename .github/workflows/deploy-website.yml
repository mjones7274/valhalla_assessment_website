name: Deploy Build Folder to S3 on Change

on:
  push:
    paths:
      - 'build/**'    # Run only if build folder changes
      - '.github/workflows/deploy-website.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-west-2' }}

      - name: Sync static assets to S3 (long cache)
        run: |
          aws s3 sync build/static/ s3://${{ secrets.S3_BUCKET_NAME }}/static/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --only-show-errors

      - name: Sync non-HTML files to S3 (short cache)
        run: |
          aws s3 sync build/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --exclude "index.html" \
            --exclude "static/*" \
            --cache-control "public,max-age=300" \
            --only-show-errors

      - name: Upload index.html (no cache)
        run: |
          aws s3 cp build/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate,max-age=0" \
            --content-type "text/html; charset=utf-8" \
            --only-show-errors

      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -z "$DISTRIBUTION_ID" ]; then
            echo "CLOUDFRONT_DISTRIBUTION_ID is not set. Skipping invalidation."
            exit 0
          fi

          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/" "/index.html" "/asset-manifest.json" "/static/*"